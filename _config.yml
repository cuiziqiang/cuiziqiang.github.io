title: 崔自强 | Ziqiang Cui
subtitle: 天津大学电气自动化与信息工程学院 副教授
author: 崔自强 Ziqiang Cui
email: cuiziqiang@tju.edu.cn
description: >-
  崔自强，天津大学电气自动化与信息工程学院副教授、硕士/博士生导师。
  主要从事工业过程成像、多相流参数检测、生物电阻抗断层成像与无损检测等方向的研究。
  Ziqiang Cui, Associate Professor at the School of Electrical and Information
  Engineering, Tianjin University. Research focuses on industrial process
  tomography, multiphase flow measurement, electrical impedance tomography and
  non-destructive testing.
lang: zh-CN
url: "https://cuiziqiang.github.io"
baseurl: ""

theme: minima
minima:
  skin: classic
  nav_pages:
    - index.md
    - research.md
    - publications.md
    - teaching.md
    - cv.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

header_pages:
  - index.md
  - research.md
  - publications.md
  - teaching.md
  - cv.md

exclude:
  - README.md
  - intro.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
